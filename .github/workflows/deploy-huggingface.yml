name: Deploy Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'Joaoemanuel2666/SaudeConnect-Web' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade huggingface_hub

      - name: Create or update Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, create_repo, upload_folder

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_ID"]

          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
              token=token,
          )

          upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".",
              token=token,
              ignore_patterns=[
                  ".git/*",
                  "node_modules/*",
                  "dist/*",
                  "data/*",
                  "android/.gradle/*",
                  "android/build/*",
                  "android/app/build/*",
                  "artifacts/screenshots/*",
                  "*.log",
                  ".env",
              ],
          )
          PY
